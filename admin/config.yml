backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "contenu"
    label: "Contenu du site"
    files:

      - label: "Page FR — Tout le contenu"
        name: "site_fr"
        file: "content/site-fr.json"
        fields:
          - label: "— HERO —"
            name: "hero_eyebrow"
            widget: "string"
          - { label: "Titre (ligne 1)", name: "hero_title", widget: "string" }
          - { label: "Titre (ligne 2, italique)", name: "hero_title_italic", widget: "string" }
          - { label: "Accroche", name: "hero_lede", widget: "text" }

          - { label: "— MON APPROCHE —", name: "approche_sep", widget: "string" }
          - { label: "Titre", name: "approche_title", widget: "string" }
          - { label: "Introduction", name: "approche_intro", widget: "text" }
          - { label: "Étape 1 — Titre", name: "approche_c1_title", widget: "string" }
          - { label: "Étape 1 — Description", name: "approche_c1_desc", widget: "text" }
          - { label: "Étape 2 — Titre", name: "approche_c2_title", widget: "string" }
          - { label: "Étape 2 — Description", name: "approche_c2_desc", widget: "text" }
          - { label: "Étape 3 — Titre", name: "approche_c3_title", widget: "string" }
          - { label: "Étape 3 — Description", name: "approche_c3_desc", widget: "text" }

          - { label: "— POUR QUI —", name: "pourqui_sep", widget: "string" }
          - { label: "Titre", name: "pourqui_title", widget: "string" }
          - { label: "Introduction", name: "pourqui_intro", widget: "text" }
          - { label: "Situation 1 — Citation", name: "pourqui_s1_q", widget: "string" }
          - { label: "Situation 1 — Tags", name: "pourqui_s1_t", widget: "string" }
          - { label: "Situation 2 — Citation", name: "pourqui_s2_q", widget: "string" }
          - { label: "Situation 2 — Tags", name: "pourqui_s2_t", widget: "string" }
          - { label: "Situation 3 — Citation", name: "pourqui_s3_q", widget: "string" }
          - { label: "Situation 3 — Tags", name: "pourqui_s3_t", widget: "string" }

          - { label: "— SENS · ÉNERGIE · ÉLAN —", name: "methode_sep", widget: "string" }
          - { label: "Question centrale", name: "methode_question", widget: "string" }
          - { label: "Introduction", name: "methode_intro", widget: "text" }
          - { label: "Pilier 1 — Mot", name: "methode_p1_word", widget: "string" }
          - { label: "Pilier 1 — Description", name: "methode_p1_desc", widget: "string" }
          - { label: "Pilier 2 — Mot", name: "methode_p2_word", widget: "string" }
          - { label: "Pilier 2 — Description", name: "methode_p2_desc", widget: "string" }
          - { label: "Pilier 3 — Mot", name: "methode_p3_word", widget: "string" }
          - { label: "Pilier 3 — Description", name: "methode_p3_desc", widget: "string" }

          - { label: "— LES SÉANCES —", name: "seances_sep", widget: "string" }
          - { label: "Titre", name: "seances_title", widget: "string" }
          - { label: "Introduction", name: "seances_intro", widget: "text" }
          - { label: "Séance 1 — Étiquette", name: "seance1_meta", widget: "string" }
          - { label: "Séance 1 — Titre", name: "seance1_title", widget: "string" }
          - { label: "Séance 1 — Description", name: "seance1_desc", widget: "text" }
          - { label: "Séance 1 — Durée", name: "seance1_dur", widget: "string" }
          - { label: "Séance 2 — Étiquette", name: "seance2_meta", widget: "string" }
          - { label: "Séance 2 — Titre", name: "seance2_title", widget: "string" }
          - { label: "Séance 2 — Description", name: "seance2_desc", widget: "text" }
          - { label: "Séance 2 — Durée", name: "seance2_dur", widget: "string" }

          - { label: "— TÉMOIGNAGES —", name: "temoignages_sep", widget: "string" }
          - { label: "Titre", name: "temoignages_title", widget: "string" }
          - { label: "Introduction", name: "temoignages_intro", widget: "text" }

          - { label: "— À PROPOS —", name: "apropos_sep", widget: "string" }
          - { label: "Paragraphe 1", name: "apropos_p1", widget: "text" }
          - { label: "Paragraphe 2", name: "apropos_p2", widget: "text" }
          - { label: "Citation", name: "apropos_pull", widget: "text" }
          - { label: "Paragraphe 3", name: "apropos_p3", widget: "text" }

          - { label: "— CONTACT —", name: "contact_sep", widget: "string" }
          - { label: "Titre", name: "contact_title", widget: "string" }
          - { label: "Introduction", name: "contact_intro", widget: "text" }
          - { label: "Citation", name: "contact_quote", widget: "string" }

      - label: "Page NL — Alle inhoud"
        name: "site_nl"
        file: "content/site-nl.json"
        fields:
          - { label: "— HERO —", name: "hero_eyebrow", widget: "string" }
          - { label: "Titel (regel 1)", name: "hero_title", widget: "string" }
          - { label: "Titel (regel 2, cursief)", name: "hero_title_italic", widget: "string" }
          - { label: "Intro", name: "hero_lede", widget: "text" }
          - { label: "— MIJN AANPAK —", name: "approche_sep", widget: "string" }
          - { label: "Titel", name: "approche_title", widget: "string" }
          - { label: "Introductie", name: "approche_intro", widget: "text" }
          - { label: "Stap 1 — Titel", name: "approche_c1_title", widget: "string" }
          - { label: "Stap 1 — Beschrijving", name: "approche_c1_desc", widget: "text" }
          - { label: "Stap 2 — Titel", name: "approche_c2_title", widget: "string" }
          - { label: "Stap 2 — Beschrijving", name: "approche_c2_desc", widget: "text" }
          - { label: "Stap 3 — Titel", name: "approche_c3_title", widget: "string" }
          - { label: "Stap 3 — Beschrijving", name: "approche_c3_desc", widget: "text" }
          - { label: "— VOOR WIE —", name: "pourqui_sep", widget: "string" }
          - { label: "Titel", name: "pourqui_title", widget: "string" }
          - { label: "Introductie", name: "pourqui_intro", widget: "text" }
          - { label: "Situatie 1 — Citaat", name: "pourqui_s1_q", widget: "string" }
          - { label: "Situatie 1 — Tags", name: "pourqui_s1_t", widget: "string" }
          - { label: "Situatie 2 — Citaat", name: "pourqui_s2_q", widget: "string" }
          - { label: "Situatie 2 — Tags", name: "pourqui_s2_t", widget: "string" }
          - { label: "Situatie 3 — Citaat", name: "pourqui_s3_q", widget: "string" }
          - { label: "Situatie 3 — Tags", name: "pourqui_s3_t", widget: "string" }
          - { label: "— ZIN · ENERGIE · GEDREVENHEID —", name: "methode_sep", widget: "string" }
          - { label: "Centrale vraag", name: "methode_question", widget: "string" }
          - { label: "Introductie", name: "methode_intro", widget: "text" }
          - { label: "Pijler 1 — Woord", name: "methode_p1_word", widget: "string" }
          - { label: "Pijler 1 — Beschrijving", name: "methode_p1_desc", widget: "string" }
          - { label: "Pijler 2 — Woord", name: "methode_p2_word", widget: "string" }
          - { label: "Pijler 2 — Beschrijving", name: "methode_p2_desc", widget: "string" }
          - { label: "Pijler 3 — Woord", name: "methode_p3_word", widget: "string" }
          - { label: "Pijler 3 — Beschrijving", name: "methode_p3_desc", widget: "string" }
          - { label: "— DE SESSIES —", name: "seances_sep", widget: "string" }
          - { label: "Titel", name: "seances_title", widget: "string" }
          - { label: "Introductie", name: "seances_intro", widget: "text" }
          - { label: "Sessie 1 — Label", name: "seance1_meta", widget: "string" }
          - { label: "Sessie 1 — Titel", name: "seance1_title", widget: "string" }
          - { label: "Sessie 1 — Beschrijving", name: "seance1_desc", widget: "text" }
          - { label: "Sessie 1 — Duur", name: "seance1_dur", widget: "string" }
          - { label: "Sessie 2 — Label", name: "seance2_meta", widget: "string" }
          - { label: "Sessie 2 — Titel", name: "seance2_title", widget: "string" }
          - { label: "Sessie 2 — Beschrijving", name: "seance2_desc", widget: "text" }
          - { label: "Sessie 2 — Duur", name: "seance2_dur", widget: "string" }
          - { label: "— GETUIGENISSEN —", name: "temoignages_sep", widget: "string" }
          - { label: "Titel", name: "temoignages_title", widget: "string" }
          - { label: "Introductie", name: "temoignages_intro", widget: "text" }
          - { label: "— OVER MIJ —", name: "apropos_sep", widget: "string" }
          - { label: "Paragraaf 1", name: "apropos_p1", widget: "text" }
          - { label: "Paragraaf 2", name: "apropos_p2", widget: "text" }
          - { label: "Citaat", name: "apropos_pull", widget: "text" }
          - { label: "Paragraaf 3", name: "apropos_p3", widget: "text" }
          - { label: "— CONTACT —", name: "contact_sep", widget: "string" }
          - { label: "Titel", name: "contact_title", widget: "string" }
          - { label: "Introductie", name: "contact_intro", widget: "text" }
          - { label: "Citaat", name: "contact_quote", widget: "string" }

      - label: "Témoignages (FR)"
        name: "temoignages_fr"
        file: "content/temoignages-fr.json"
        fields:
          - label: "Témoignages"
            name: "items"
            widget: "list"
            summary: "{{fields.author}}"
            fields:
              - { label: "Citation", name: "quote", widget: "text" }
              - { label: "Prénom Nom", name: "author", widget: "string" }
              - { label: "Contexte", name: "context", widget: "string" }

      - label: "Getuigenissen (NL)"
        name: "temoignages_nl"
        file: "content/temoignages-nl.json"
        fields:
          - label: "Getuigenissen"
            name: "items"
            widget: "list"
            summary: "{{fields.author}}"
            fields:
              - { label: "Citaat", name: "quote", widget: "text" }
              - { label: "Naam", name: "author", widget: "string" }
              - { label: "Context", name: "context", widget: "string" }

      - label: "Informations de contact"
        name: "contact"
        file: "content/contact.json"
        fields:
          - { label: "E-mail", name: "email", widget: "string" }
          - { label: "Téléphone", name: "phone", widget: "string" }
          - { label: "Instagram", name: "instagram", widget: "string" }
          - { label: "Adresse", name: "address", widget: "string" }
          - { label: "Site web", name: "website", widget: "string" }
